<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel API • Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f2027, #203a43, #14532d);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* ========================= */
        /* 3D MEDICAL CROSS */
        /* ========================= */

        .scene {
            width: 200px;
            height: 200px;
            perspective: 800px;
            margin-bottom: 50px;
        }

        .cross {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 8s infinite linear;
        }

        @keyframes rotate {
            0% {
                transform: rotateX(0deg) rotateY(0deg);
            }

            100% {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        .bar {
            position: absolute;
            background: linear-gradient(45deg, #00ff9d, #00cc77);
            box-shadow: 0 0 30px #00ff9d, 0 0 60px #00cc77;
            border-radius: 10px;
        }

        /* vertical bar */
        .bar.vertical {
            width: 50px;
            height: 180px;
            left: 75px;
            top: 10px;
        }

        /* horizontal bar */
        .bar.horizontal {
            width: 180px;
            height: 50px;
            top: 75px;
            left: 10px;
        }

        /* fake 3D depth */
        .bar::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            transform: translateZ(-20px);
            border-radius: 10px;
        }

        /* floating effect */
        .cross {
            animation: rotate 8s infinite linear, float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotateX(0deg) rotateY(0deg);
            }

            50% {
                transform: translateY(-15px) rotateX(180deg) rotateY(180deg);
            }
        }

        /* ========================= */
        /* VESSEL LOGO */
        /* ========================= */

        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 8px;
            position: relative;
            color: #00ff9d;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00ff9d,
                    0 0 20px #00ff9d,
                    0 0 40px #00cc77;
            }

            to {
                text-shadow: 0 0 20px #00ff9d,
                    0 0 40px #00cc77,
                    0 0 80px #00ff9d;
            }
        }

        /* animated underline wave */
        .logo::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -15px;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ff9d, transparent);
            animation: slide 2s linear infinite;
        }

        @keyframes slide {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* tagline */
        .tagline {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.85;
            color: #b6ffe5;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 0.85;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="scene">
        <div class="cross">
            <div class="bar vertical"></div>
            <div class="bar horizontal"></div>
        </div>
    </div>

    <div class="logo">VESSEL</div>
    <div class="tagline">
        HELTY • Hospital Management Systems
    </div>

</body>

</html>
