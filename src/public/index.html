<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel API • Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f2027, #203a43, #14532d);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* ================= PARTICLES ================= */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* ================= 3D CROSS ================= */
        .scene {
            width: 200px;
            height: 200px;
            perspective: 800px;
            margin-bottom: 50px;
            z-index: 2;
        }

        .cross {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        @keyframes rotate {
            0% {
                transform: rotateX(0deg) rotateY(0deg);
            }

            100% {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        .bar {
            position: absolute;
            background: linear-gradient(45deg, #00ff9d, #00cc77);
            box-shadow: 0 0 30px #00ff9d, 0 0 60px #00cc77;
            border-radius: 10px;
        }

        .bar.vertical {
            width: 50px;
            height: 180px;
            left: 75px;
            top: 10px;
        }

        .bar.horizontal {
            width: 180px;
            height: 50px;
            top: 75px;
            left: 10px;
        }

        /* ================= LOGO ================= */
        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #00ff9d;
            animation: glow 2s ease-in-out infinite alternate;
            z-index: 2;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00ff9d,
                    0 0 20px #00ff9d,
                    0 0 40px #00cc77;
            }

            to {
                text-shadow: 0 0 20px #00ff9d,
                    0 0 40px #00cc77,
                    0 0 80px #00ff9d;
            }
        }

        .tagline {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.85;
            color: #b6ffe5;
            z-index: 2;
        }

        /* ================= RUNNER BALL ================= */
        #runner {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #00ff9d;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff9d;
            z-index: 3;
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <div class="scene">
        <div class="cross">
            <div class="bar vertical"></div>
            <div class="bar horizontal"></div>
        </div>
    </div>

    <div class="logo">VESSEL</div>
    <div class="tagline">
        HELTY • Best in Healthcare & Hospital Management Systems
    </div>

    <div id="runner"></div>

    <script>
        /* ================= PARTICLE SYSTEM ================= */
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5
            });
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0,255,150,0.6)";
            for (let p of particles) {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* ================= RUNNER BALL PHYSICS ================= */
        const runner = document.getElementById("runner");

        let x = window.innerWidth / 2;
        let y = window.innerHeight / 2;
        let vx = 0;
        let vy = 0;

        function updateRunner() {
            x += vx;
            y += vy;

            // friction
            vx *= 0.95;
            vy *= 0.95;

            // keep inside screen
            const radius = 11;
            if (x < radius) { x = radius; vx *= -1; }
            if (x > window.innerWidth - radius) { x = window.innerWidth - radius; vx *= -1; }
            if (y < radius) { y = radius; vy *= -1; }
            if (y > window.innerHeight - radius) { y = window.innerHeight - radius; vy *= -1; }

            runner.style.left = x - radius + "px";
            runner.style.top = y - radius + "px";

            requestAnimationFrame(updateRunner);
        }
        updateRunner();

        document.addEventListener("mousemove", (e) => {
            const dx = x - e.clientX;
            const dy = y - e.clientY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 150) {
                vx += dx / distance * 2;
                vy += dy / distance * 2;
            }
        });
    </script>

</body>

</html>
